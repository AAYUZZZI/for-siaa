<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love Letter ❤️</title>

<!-- Handwriting Font -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Dancing Script', cursive;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  display: flex;
  gap: 40px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

/* LETTER PAGE */
.letter {
  background: #fffaf5;
  width: 520px;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  line-height: 1.9;
  font-size: 20px;
  position: relative;
  overflow: hidden;
}

/* LINES LIKE PAPER */
.letter::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    transparent,
    transparent 28px,
    #ffd6e0 29px
  );
  pointer-events: none;
  z-index: 0;   /* 👈 IMPORTANT */
}
#typedText {
  position: relative;
  z-index: 1;   /* 👈 brings text above lines */
}

.cursor {
  display: inline-block;
  width: 2px;
  background: black;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

/* PHOTO FRAME */
.photo-frame {
  border: 12px solid #8b5e3c;
  padding: 8px;
  border-radius: 8px;
  background: #f3e5d8;
}

.photo-frame img {
  width: 250px;
  height: 320px;
  object-fit: cover;
  display: block;
}

/* PROPOSAL */
.proposal {
  margin-top: 30px;
  text-align: center;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Dancing Script', cursive;
  font-size: 18px;
}

.yes { background: #ff4d6d; color: white; }
.definitely { background: #ff8fa3; color: white; }
.no { background: #ddd; color: black; font-size: 12px; }
</style>
</head>
<body>

<div class="container">

  <!-- LETTER -->
  <div class="letter">
    <h2>My Love ❤️</h2>

    <p id="typedText"></p><span class="cursor"></span>

    <div class="proposal">
      <p>Will you marry me in the future? 💍</p>
      <button class="yes">Yes ❤️</button>
      <button class="definitely">Definitely 💖</button>
      <button class="no">no...</button>
    </div>
  </div>

  <!-- PHOTO -->
  <div class="photo-frame">
    <img src="us.jpg" alt="Us">
  </div>

</div>

<script>
// YOUR LETTER (edit this)
const text = `Hi jaanu,

let index = 0;
const baseSpeed = 55; // slower base speed

function getDelay(char) {
  if (char === '.' || char === '!' || char === '?') return 600; // long pause
  if (char === ',') return 300; // medium pause
  if (char === '
') return 400; // line break pause
  return baseSpeed + Math.random() * 40; // slight human variation
}

function typeWriter() {
  if (index < text.length) {
    const char = text.charAt(index);
    document.getElementById("typedText").innerHTML += char === '
' ? '<br>' : char;
    index++;
    setTimeout(typeWriter, getDelay(char));
  }
}

window.onload = typeWriter;
</script>

</body>
</html>
