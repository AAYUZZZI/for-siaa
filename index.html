<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love Letter ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Dancing Script', cursive;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  display: flex;
  gap: 40px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

/* LETTER */
.letter {
  background: #fffaf5;
  width: 520px;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  line-height: 1.9;
  font-size: 20px;
  position: relative;
  overflow: hidden;
}

.letter::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    transparent,
    transparent 28px,
    #ffd6e0 29px
  );
  z-index: 0;
}

#typedText {
  position: relative;
  z-index: 1;
  color: #333;
}

.cursor {
  display: inline-block;
  width: 2px;
  background: black;
  margin-left: 3px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* PHOTO */
.photo-frame {
  border: 12px solid #8b5e3c;
  padding: 8px;
  border-radius: 8px;
  background: #f3e5d8;
}

.photo-frame img {
  width: 250px;
  height: 320px;
  object-fit: cover;
}

/* PROPOSAL */
.proposal {
  margin-top: 30px;
  text-align: center;
}

/* BUTTONS */
button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-size: 18px;
}

.yes { background: #ff4d6d; color: white; }
.no { background: #ddd; font-size: 12px; }

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.popup-content {
  background: #fffaf5;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  width: 320px;
}

/* CONFETTI */
#confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;  /* 👈 THIS FIXES IT */
  z-index: 1;
}
.letter, .proposal, button {
  position: relative;
  z-index: 2;
}  
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div id="popup" class="popup">
  <div class="popup-content">
    <h2>Yayyyy 💖</h2>
    <p>You’re stuck with me forever now 😏❤️</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<div class="container">

<div class="letter">
<h2>My Love ❤️</h2>

<p id="typedText"></p><span class="cursor"></span>

<div class="proposal" id="proposal" style="display:none;">
  <p>Will you marry me in the future? 💍</p>
  <button class="yes" onclick="showPopup(); startConfetti();">Yes ❤️</button>
  <button class="no" id="noBtn" onmouseover="moveNo()">no...</button>
</div>
</div>

<div class="photo-frame">
  <img src="us.jpg">
</div>

</div>

<script>
const text = `Hi jaanu,

From the day when we became close frnds, everything felt different. The way you smile, the way you comfort me, the way you convince me to make reels with you or to do some g masti with you … it all became my favorite part of life and that is what i want in the rest of my life....i hope we will continue with this things along with some extra things....and now when i see you i get butterflies every damn time whenever i see you because you are very special for me i cant express it with words but you really mean for me you are my comfort zone, my home, my safe place, my everything....

Every small moment with you means more than you know. You make my days lighter like you did yesterday by sending me a voice mail when i was trying to figure out what i happening with me and my family, and you always comfort me for everything and with everyone, you made me a lil bit social in life which changed my life so much and made it so better, you always encouraged me to try new things which you know that it will make me happy and only you know how i feel at some moments where no one knows about and you always distracted me at that time.....

I don’t just love you for who you are today, but for every version of you I’ll see in the future and i hope we will be together till the end and we will try to fight with the toughest situations possible and still choose each other again and again and make our bond very strong and make it unbreakable aahahaah, so yeahaha i love you so much through the bottom of my heart, you are the favoritest person ever baby i cannot imagine a future without you so that is why......

I want to build that future with you… always.

yours lovingly
yuzz 💖`;

let index = 0;

function typeWriter() {
  if (index < text.length) {
    const char = text[index];

    const el = document.getElementById("typedText");

    if (char === "\n") {
      el.innerHTML += "<br>";
    } else {
      el.innerHTML += char;
    }

    index++;

    setTimeout(typeWriter, 40); // 👈 simple delay (NO getDelay)
  } else {
    setTimeout(() => {
      document.getElementById("proposal").style.display = "block";
    }, 800);
  }
}

window.onload = function() {
  typeWriter();
};

/* NO BUTTON */
function moveNo() {
  const btn = document.getElementById("noBtn");

  btn.style.position = "absolute";
  btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

/* POPUP */
function showPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* CONFETTI */
function startConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for (let i = 0; i < 100; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 6 + 2,
      speed: Math.random() * 3 + 2
    });
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    pieces.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = Math.random() > 0.5 ? "#ff4d6d" : "#ff8fa3";
      ctx.fill();

      p.y += p.speed;
      if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(update);
  }

  update();
}
</script>

</body>
</html>
